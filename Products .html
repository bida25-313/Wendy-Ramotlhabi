<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0>">
        <title>Products</title>

        <style>
            body {
                font-family:Arial,sans-serif;
                background-color: white;
                text-align: center;
                padding:  30px;
            
            }

     h1  {
        margin-top: 30px;
     }
      
     .products {
        display: flex;
        justify-content: center;
        padding:30px;
        margin-top: 40px;
     }

     .card {
        width:150px;
        background:white ;
        border-radius: 10px ;
        box-shadow: 0 4px 8px (0,0,0,0.2);
        overflow: auto;
     }

     .card img {
        width:100%;
        height:150%;
        object-fit: cover;
     }

     .info {
        padding: 10px;
     }

     .product-name {
        font-weight: bold ;
        font-size: 18px;
     }
    
     .price {
        color:black;
        font-weight: bold;
        margin-top: 10px;

     }

     .description {
        font-size: 15px;
     }
     
     .card:hover {
        transform: scale(2.0);
        transition: 0.3s;
     }

     </style>
    </head>

    <body>

        <h1>Our Products</h1>
        <div class="products">

        <div class="card"> 
            <img src="product1.jpg" alt="Product 1">
            <div class="info"> 
            <div class="product-name">Ripped Denim dress</div>
            <div class="price">P300</div>
            </div> 
            
        <div class="card">
            <img src="Product2.jpg" alt="Product 2">
            <div class="info">
            <div class="product-name">Black denim leggings</div>
            <div class="price">P250</div>
        </div>

        <div class="card">
            <img src="Product3.jpg" alt="Product3">
            <div class="info">
            <div class="product-name">Denim skirt</div>
            <div class="price">P350</div>
         </div>

</body>
</html>
